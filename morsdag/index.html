<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>❤️</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      width: 100vw;
      height: 100dvh;
      overflow: hidden;
      font-family: 'Georgia', serif;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── Splash screen ── */
    #splash {
      position: fixed;
      inset: 0;
      background: #0a0a0a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2rem;
      z-index: 10;
      cursor: pointer;
      transition: opacity 0.8s ease;
    }

    #splash.hide {
      opacity: 0;
      pointer-events: none;
    }

    .pulse-ring {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: rgba(255, 80, 80, 0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      animation: pulse 2s ease-in-out infinite;
    }

    .heart {
      font-size: 3.5rem;
      animation: heartbeat 1.2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255,80,80,0.3); }
      50%       { transform: scale(1.08); box-shadow: 0 0 0 24px rgba(255,80,80,0); }
    }

    @keyframes heartbeat {
      0%, 100% { transform: scale(1); }
      14%      { transform: scale(1.2); }
      28%      { transform: scale(1); }
      42%      { transform: scale(1.15); }
      56%      { transform: scale(1); }
    }

    .splash-text {
      color: #fff;
      font-size: 1.1rem;
      letter-spacing: 0.05em;
      opacity: 0.85;
    }

    .tap-hint {
      color: rgba(255,255,255,0.4);
      font-size: 0.8rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-top: 1rem;
      animation: blink 2s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 0.4; }
      50%       { opacity: 0.9; }
    }

    /* ── Video (iframe) ── */
    #player {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      background: #000;
      border: none;
      opacity: 0;
      transition: opacity 1s ease;
    }

    #player.visible {
      opacity: 1;
    }
  </style>
</head>
<body>

  <iframe
    id="player"
    src="https://drive.google.com/file/d/1WyEi-doqGnyE7vsjJu4NvOyYZGKh6GwJ/preview"
    allow="autoplay; fullscreen"
    allowfullscreen
    frameborder="0"
  ></iframe>

  <div id="splash" onclick="startVideo()">
    <div class="pulse-ring">
      <span class="heart">❤️</span>
    </div>
    <p class="splash-text">Något till dig</p>
    <p class="tap-hint">Tryck för att öppna</p>
  </div>

  <script>
    async function startVideo() {
      const splash = document.getElementById('splash');
      const player = document.getElementById('player');

      // 1. Begär helskärm
      const el = document.documentElement;
      try {
        if (el.requestFullscreen)             await el.requestFullscreen();
        else if (el.webkitRequestFullscreen)  el.webkitRequestFullscreen();
        else if (el.mozRequestFullScreen)     el.mozRequestFullScreen();
      } catch(e) {}

      // 2. Visa iframen
      player.classList.add('visible');

      // 3. Göm splash
      splash.classList.add('hide');
      setTimeout(() => splash.remove(), 900);
    }

    // Lås skärmorientering till landscape om möjligt
    if (screen.orientation && screen.orientation.lock) {
      screen.orientation.lock('landscape').catch(() => {});
    }
  </script>

</body>
</html>
