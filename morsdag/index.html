<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>❤️</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      width: 100vw;
      height: 100dvh;
      overflow: hidden;
      font-family: 'Georgia', serif;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── Splash screen ── */
    #splash {
      position: fixed;
      inset: 0;
      background: #0a0a0a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2rem;
      z-index: 10;
      transition: opacity 0.8s ease;
    }

    #splash.hide {
      opacity: 0;
      pointer-events: none;
    }

    .pulse-ring {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: rgba(255, 80, 80, 0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      animation: pulse 2s ease-in-out infinite;
    }

    .heart {
      font-size: 3.5rem;
      animation: heartbeat 1.2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255,80,80,0.3); }
      50%       { transform: scale(1.08); box-shadow: 0 0 0 24px rgba(255,80,80,0); }
    }

    @keyframes heartbeat {
      0%, 100% { transform: scale(1); }
      14%      { transform: scale(1.2); }
      28%      { transform: scale(1); }
      42%      { transform: scale(1.15); }
      56%      { transform: scale(1); }
    }

    .splash-text {
      color: #fff;
      font-size: 1.1rem;
      letter-spacing: 0.05em;
      opacity: 0.85;
    }

    /* ── Progress bar ── */
    .progress-wrap {
      width: 200px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
    }

    .progress-track {
      width: 100%;
      height: 3px;
      background: rgba(255,255,255,0.12);
      border-radius: 99px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: rgba(255,80,80,0.8);
      border-radius: 99px;
      transition: width 0.3s ease;
    }

    .progress-label {
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.35);
    }

    /* ── Tap button – hidden until ready ── */
    .tap-btn {
      margin-top: 0.5rem;
      padding: 0.75rem 2rem;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 99px;
      background: transparent;
      color: #fff;
      font-family: 'Georgia', serif;
      font-size: 0.95rem;
      letter-spacing: 0.08em;
      cursor: pointer;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.5s ease, transform 0.5s ease, background 0.2s;
      pointer-events: none;
    }

    .tap-btn.ready {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    .tap-btn:active {
      background: rgba(255,255,255,0.1);
    }

    /* ── Video ── */
    #player {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      background: #000;
      border: none;
      opacity: 0;
      transition: opacity 1s ease;
    }

    #player.visible {
      opacity: 1;
    }
  </style>
</head>
<body>

  <video
    id="player"
    src="https://www.dropbox.com/scl/fi/tn9ix07iwogvtvtr1bktx/morsdag2.mp4?rlkey=vbzqhyuwi86lbqhp5u2lbbf0c&st=198gz2no&raw=1"
    playsinline
    webkit-playsinline
    preload="auto"
  ></video>

  <div id="splash">
    <div class="pulse-ring">
      <span class="heart">❤️</span>
    </div>
    <p class="splash-text">Något till dig</p>

    <div class="progress-wrap">
      <div class="progress-track">
        <div class="progress-fill" id="bar"></div>
      </div>
      <p class="progress-label" id="bar-label">Laddar...</p>
    </div>

    <button class="tap-btn" id="tapBtn" onclick="startVideo()">Öppna ❤️</button>
  </div>

  <script>
    const video    = document.getElementById('player');
    const bar      = document.getElementById('bar');
    const barLabel = document.getElementById('bar-label');
    const tapBtn   = document.getElementById('tapBtn');

    function setReady() {
      bar.style.width = '100%';
      barLabel.textContent = 'Redo';
      tapBtn.classList.add('ready');
    }

    // Lyssna på buffring
    video.addEventListener('progress', () => {
      if (video.buffered.length > 0 && video.duration) {
        const pct = (video.buffered.end(0) / video.duration) * 100;
        bar.style.width = Math.min(pct, 100) + '%';
        if (pct >= 100) setReady();
      }
    });

    // canplaythrough = tillräckligt buffrat för att spela utan stopp
    video.addEventListener('canplaythrough', setReady);

    // Fallback: om ingen progress-event inom 8s, lås upp ändå
    setTimeout(setReady, 8000);

    async function startVideo() {
      const splash = document.getElementById('splash');

      video.play().catch(() => {});
      video.classList.add('visible');

      try {
        if (video.requestFullscreen)           await video.requestFullscreen();
        else if (video.webkitEnterFullscreen)  video.webkitEnterFullscreen();
        else if (video.mozRequestFullScreen)   video.mozRequestFullScreen();
      } catch(e) {}

      splash.classList.add('hide');
      setTimeout(() => splash.remove(), 900);
    }

    if (screen.orientation && screen.orientation.lock) {
      screen.orientation.lock('landscape').catch(() => {});
    }
  </script>

</body>
</html>
